# configs/defaults/evaluation_data.yaml
# Defines default settings for evaluation data loading.
# These values will be used by the data loader for evaluation runs.

evaluation_data:
  # symbol is now expected to be provided by a higher-level config (e.g., run_settings.yaml)
  start_date: "2025-04-01 00:00:00" # Default start date for evaluation data (YYYY-MM-DD HH:MM:SS)
  end_date: "2025-04-30 23:59:59" # Default end date for evaluation data (YYYY-MM-DD HH:MM:SS)
  timeframe: "1h" # Changed: Default K-line interval for evaluation is now 1h
  # You can add other evaluation-specific data settings here if needed.
